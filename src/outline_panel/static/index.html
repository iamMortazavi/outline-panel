<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0b0c" />
<title>Outline Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#0a0b0c;--panel:#121317;--panel2:#15171c;--line:#23252b;--line2:#26282f;--line3:#34373f;
    --text:#ECEEF3;--muted:#9498A2;--faint:#787d88;--dim:#5b606b;
    --acc:#c7f250;--ink:#10130a;--warn:#f5c451;--danger:#ff7a7a;--danger2:#ff9a9a;
    --mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Hanken Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100dvh;
    background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.022) 1px,transparent 0);background-size:24px 24px}
  ::selection{background:rgba(199,242,80,.28);color:#fff}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#23252b;border-radius:99px;border:3px solid var(--bg)}
  @keyframes ocPulse{0%,100%{opacity:1}50%{opacity:.32}}
  @keyframes ocSpin{to{transform:rotate(360deg)}}
  @keyframes ocRise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes ocFade{from{opacity:0}to{opacity:1}}
  @keyframes ocSheet{from{opacity:0;transform:translateY(14px) scale(.99)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes ocDrawer{from{transform:translateX(40px);opacity:.4}to{transform:translateX(0);opacity:1}}
  button,input,select,textarea{font-family:inherit}
  .hidden{display:none!important}.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  a{color:var(--acc)}
  .btn{width:100%;padding:14px;border-radius:12px;font-weight:700;font-size:15px;background:var(--acc);color:var(--ink);border:none;cursor:pointer;letter-spacing:.2px;transition:filter .15s}
  .btn:hover{filter:brightness(1.06)}.btn:disabled{opacity:.55;cursor:default}
  .btn-sec{width:100%;padding:13px;border-radius:12px;font-weight:600;font-size:14px;background:var(--panel2);color:var(--text);border:1px solid var(--line2);cursor:pointer;transition:border-color .15s}
  .btn-sec:hover{border-color:var(--line3)}
  .btn-danger{width:100%;padding:13px;border-radius:12px;font-weight:600;font-size:14px;background:rgba(255,122,122,.1);color:var(--danger2);border:1px solid rgba(255,122,122,.28);cursor:pointer}
  .btn-danger:hover{background:rgba(255,122,122,.16)}
  .inp{width:100%;padding:13px;border-radius:11px;background:var(--panel2);border:1px solid var(--line2);color:var(--text);font-size:15px;outline:none}
  .inp:focus{border-color:rgba(199,242,80,.4)}
  textarea.inp{font-family:var(--mono);font-size:13px;min-height:84px;resize:vertical;line-height:1.5}
  .lab{display:block;font-size:11px;color:#969BA6;margin:0 0 8px;text-transform:uppercase;letter-spacing:.7px;font-weight:600}
  .field{margin-bottom:18px}
  .h2{font-weight:800;font-size:22px;letter-spacing:-.6px;margin:2px 0 5px}
  .desc{color:#969BA6;font-size:13.5px;margin:0 0 20px;line-height:1.5}
  .chip{padding:9px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-family:var(--mono);background:var(--panel2);border:1px solid var(--line2);color:var(--muted);display:inline-block}
  .chip.sel{background:rgba(199,242,80,.12);border-color:rgba(199,242,80,.32);color:var(--acc)}
  .icon-btn{background:var(--panel2);border:1px solid var(--line2);color:var(--muted);padding:7px;border-radius:8px;cursor:pointer;line-height:0}
  .icon-btn:hover{border-color:var(--line3);color:var(--acc)}
  .overlay{position:fixed;inset:0;background:rgba(4,5,6,.7);backdrop-filter:blur(5px);z-index:50;display:flex;animation:ocFade .18s}
  .overlay.center{align-items:center;justify-content:center;padding:24px}
  .overlay.bottom{align-items:flex-end;justify-content:center}
  .overlay.right{align-items:stretch;justify-content:flex-end;background:rgba(4,5,6,.62)}
  .sheet{background:#0e0f12;border:1px solid #2b2e36;border-radius:22px;width:100%;max-width:480px;max-height:90dvh;overflow:auto;padding:6px 24px 26px;animation:ocSheet .22s both;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .sheet.wide{max-width:520px}
  .drawer{background:#0c0d10;border-left:1px solid #2b2e36;width:100%;max-width:460px;height:100dvh;overflow:auto;padding:0 0 28px;animation:ocDrawer .26s cubic-bezier(.2,.7,.2,1) both;box-shadow:-30px 0 80px rgba(0,0,0,.5)}
  .grip{width:42px;height:5px;border-radius:99px;background:#2b2e36;margin:10px auto 6px}
  .spin{width:16px;height:16px;border:2px solid rgba(16,19,10,.3);border-top-color:var(--ink);border-radius:50%;animation:ocSpin .7s linear infinite;display:inline-block;vertical-align:-3px}
  .err{color:var(--danger2);font-size:13px;min-height:1px;margin:4px 0}
  .srow{display:flex;align-items:center;gap:12px;padding:14px 15px;background:var(--panel2);border:1px solid var(--line2);border-radius:13px;margin-bottom:10px;cursor:pointer}
  .srow:hover{border-color:var(--line3)}
  .toggle{position:relative;width:46px;height:27px;flex:none;cursor:pointer}
  .toggle .tk{position:absolute;inset:0;border-radius:99px;transition:.2s;background:var(--panel2);border:1px solid var(--line3)}
  .toggle .kn{position:absolute;width:19px;height:19px;top:3px;left:3px;border-radius:50%;transition:.2s;background:var(--faint)}
  .toggle.on .tk{background:rgba(199,242,80,.16);border-color:rgba(199,242,80,.4)}
  .toggle.on .kn{left:24px;background:var(--acc)}
  @media(max-width:719px){.sheet{border-radius:22px 22px 0 0;border-bottom:none;max-width:none;padding:4px 18px max(24px,env(safe-area-inset-bottom))}.drawer{max-width:none}}
</style>
</head>
<body>
<div id="root"></div>
<div id="modalRoot"></div>
<div id="toast"></div>
<script>
const $=s=>document.querySelector(s);
const root=$('#root'), modalRoot=$('#modalRoot');
const api=async(p,o={})=>{const r=await fetch(p,{credentials:'same-origin',headers:{'Content-Type':'application/json'},...o});
  let d=null;try{d=await r.json();}catch(_){}if(!r.ok)throw new Error((d&&d.detail)||('HTTP '+r.status));return d;};
let toastT;function toast(m,bad){const t=$('#toast');t.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:'+(bad?'var(--danger)':'var(--acc)')+'"></span>'+esc(m);
  t.style.cssText='position:fixed;left:50%;bottom:30px;transform:translateX(-50%);z-index:70;background:#16181d;color:var(--text);border:1px solid '+(bad?'rgba(255,122,122,.4)':'#2b2e36')+';padding:12px 20px;border-radius:99px;font-size:13.5px;font-weight:500;box-shadow:0 14px 40px rgba(0,0,0,.55);display:flex;align-items:center;gap:9px;animation:ocRise .2s both';
  clearTimeout(toastT);toastT=setTimeout(()=>t.style.display='none',2300);t.style.display='flex';}

/* ---------- helpers ---------- */
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function fmtBytes(n){if(n==null)return '—';let u=['B','KB','MB','GB','TB','PB'],i=0,x=Number(n);while(Math.abs(x)>=1024&&i<u.length-1){x/=1024;i++;}return (i>=2&&x<100?x.toFixed(1):Math.round(x))+' '+u[i];}
function fmtExpiry(ts){if(!ts)return 'No expiry';const ms=ts*1000,n=Date.now();if(ms<=n)return 'Expired';const d=Math.floor((ms-n)/864e5),h=Math.floor(((ms-n)%864e5)/36e5);return d>0?d+'d '+h+'h':h+'h';}
function fmtAgo(sec){if(sec==null)return 'never';if(sec<90)return 'just now';const m=Math.floor(sec/60);if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<48)return h+'h ago';return Math.floor(h/24)+'d ago';}
function fmtDur(sec){if(!sec)return '0h';const h=Math.floor(sec/3600);return h<48?h+'h':Math.floor(h/24)+'d';}
function isOnline(k){return !k.disabled&&!k.pending&&k.lastSeen&&(Date.now()/1000-k.lastSeen)<300;}
function agoSec(k){return k.lastSeen?Math.max(0,Math.floor(Date.now()/1000-k.lastSeen)):null;}
function flag(cc){if(!cc||cc.length!==2)return '🌐';const A=0x1F1E6;return String.fromCodePoint(...[...cc.toUpperCase()].map(c=>A+c.charCodeAt(0)-65));}
let _rn;function countryName(cc){if(!cc||cc.length!==2)return cc||'Unknown';try{_rn=_rn||new Intl.DisplayNames(['en'],{type:'region'});return _rn.of(cc.toUpperCase())||cc;}catch(e){return cc;}}
function tagUrl(k){const u=k.accessUrl||'';const m=u.match(/^(ss:\/\/[^@]+@[^\/?#]+)/);return (m?m[1]:u.split(/[\/?#]/)[0])+(k.name?'#'+encodeURIComponent(k.name.replace(/\s+/g,'')):'');}
function srvName(id){const s=S.servers.find(x=>x.id===id);return s?s.name:id;}
function srvShort(id){const s=S.servers.find(x=>x.id===id);if(!s)return id;return (s.name||'').split(/[ ·]/)[0]||id;}
function srvDot(id){const s=S.servers.find(x=>x.id===id);return s&&s.reachable?'var(--acc)':'var(--danger)';}

/* ---------- state ---------- */
const S={screen:'login',servers:[],keys:[],errors:[],stats:null,
  srvFilter:'all',statusFilter:'all',sort:localStorage.getItem('oc_sort')||'recent',
  view:localStorage.getItem('oc_view')||'table',search:'',selected:{},srvMenuOpen:false,
  bwSamples:[],bannerDismissed:false,totpEnabled:false};
let pollT=null;

/* ---------- auth ---------- */
async function checkAuth(){try{await api('/api/me');await enterApp();}catch(_){showLogin();}}
function showLogin(needTotp){
  S.screen='login';if(pollT){clearInterval(pollT);pollT=null;}
  root.innerHTML=`<div style="min-height:100dvh;display:grid;place-items:center;padding:24px;position:relative;overflow:hidden">
    <div style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(110% 70% at 50% -10%,rgba(199,242,80,.07),transparent 58%)"></div>
    <div style="width:100%;max-width:380px;position:relative;animation:ocRise .5s both">
      <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:30px">
        <span style="width:11px;height:11px;border-radius:50%;background:var(--acc);box-shadow:0 0 16px var(--acc)"></span>
        <span style="font-weight:800;font-size:19px;letter-spacing:-.4px">Outline<span style="color:#969BA6;font-weight:600"> Control</span></span></div>
      <h1 style="font-weight:800;font-size:30px;letter-spacing:-1px;margin:0 0 8px;text-align:center">Welcome back.</h1>
      <p class="desc" style="text-align:center;margin-bottom:30px">Sign in to manage your servers and keys.</p>
      <label class="lab">Password</label>
      <input id="pw" class="inp" type="password" placeholder="••••••••••" autocomplete="current-password" style="padding:14px;font-size:16px" />
      <div id="totpWrap" class="${needTotp?'':'hidden'}" style="margin-top:14px"><label class="lab">Two-factor code</label>
        <input id="totp" class="inp" inputmode="numeric" autocomplete="one-time-code" placeholder="000000" style="padding:14px;font-size:16px" /></div>
      <div id="loginErr" class="err" style="text-align:center;margin-top:12px"></div>
      <div style="height:8px"></div>
      <button class="btn" id="loginBtn" style="padding:15px">Sign in →</button>
    </div></div>`;
  const go=()=>doLogin();
  $('#loginBtn').onclick=go;
  $('#pw').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  $('#totp')?.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  if(needTotp)$('#totp').focus();else $('#pw').focus();
}
async function doLogin(){
  const pw=$('#pw').value,tot=($('#totp')?.value||'').trim(),b=$('#loginBtn');
  $('#loginErr').textContent='';b.disabled=true;b.innerHTML='<span class="spin"></span>';
  try{await api('/api/login',{method:'POST',body:JSON.stringify({password:pw,totp:tot||null})});await enterApp();}
  catch(e){if(/2fa code required/i.test(e.message)){if($('#totpWrap').classList.contains('hidden')){showLogin(true);$('#pw').value=pw;}$('#loginErr').textContent='Enter your two-factor code.';}
    else{$('#loginErr').textContent=e.message;b.disabled=false;b.textContent='Sign in →';}}
}
async function signOut(){try{await api('/api/logout',{method:'POST'});}catch(_){}showLogin();}

/* ---------- data ---------- */
async function loadAll(){
  const [sv,st,ks]=await Promise.all([api('/api/servers'),api('/api/stats'),api('/api/keys')]);
  S.servers=sv.servers||[];S.stats=st;S.keys=ks.keys||[];S.errors=ks.errors||[];pushBw();
}
async function refreshKeys(){try{const ks=await api('/api/keys');S.keys=ks.keys||[];S.errors=ks.errors||[];}catch(_){}}
async function refreshStats(){try{S.stats=await api('/api/stats');pushBw();}catch(_){}}
let _lastBwTs=null;
function pushBw(){
  if(!(S.stats&&S.stats.available))return;
  const ts=S.stats.bwTs, v=S.stats.bwCurrent||0;
  // Outline refreshes bandwidth only ~once a minute; add a point only when the
  // sample is genuinely new (by timestamp) so the line isn't a flat duplicate.
  if(ts!=null){if(ts===_lastBwTs)return;_lastBwTs=ts;}
  else{if(S.bwSamples.length&&S.bwSamples[S.bwSamples.length-1]===v)return;}
  S.bwSamples.push(v);if(S.bwSamples.length>60)S.bwSamples.shift();
}
async function enterApp(){
  S.screen='app';root.innerHTML='<div style="min-height:100dvh;display:grid;place-items:center"><span class="spin" style="border-color:rgba(199,242,80,.25);border-top-color:var(--acc)"></span></div>';
  try{await loadAll();}catch(e){if(/auth|session/i.test(e.message))return showLogin();}
  renderApp();
  if(pollT)clearInterval(pollT);
  let n=0;pollT=setInterval(async()=>{await refreshStats();renderRail();renderKpi();if(++n%6===0){await refreshKeys();renderList();}},5000);
}

/* ---------- scoped computation ---------- */
function scoped(){return S.keys.filter(k=>S.srvFilter==='all'||k.serverId===S.srvFilter);}
function filteredKeys(){
  const q=S.search.trim().toLowerCase();
  let list=scoped().filter(k=>{
    if(S.statusFilter==='online')return isOnline(k);
    if(S.statusFilter==='active')return !k.disabled&&!k.pending;
    if(S.statusFilter==='pending')return k.pending;
    if(S.statusFilter==='disabled')return k.disabled;
    return true;
  }).filter(k=>!q||(k.name||'').toLowerCase().includes(q)||String(k.id).includes(q));
  const m=S.sort,now=Date.now()/1000;
  return list.slice().sort((a,b)=>{
    if(m==='name')return (a.name||'').localeCompare(b.name||'');
    if(m==='usage')return (b.used||0)-(a.used||0);
    if(m==='expiry')return (a.expiry||Infinity)-(b.expiry||Infinity);
    if(m==='devices')return (b.peakDevices||0)-(a.peakDevices||0);
    if(m==='online')return (isOnline(b)-isOnline(a))||((b.lastSeen||0)-(a.lastSeen||0));
    if(m==='lastseen')return (b.lastSeen||0)-(a.lastSeen||0);
    return (parseInt(b.id)||0)-(parseInt(a.id)||0);
  });
}
function statusMeta(k){
  if(k.pending)return{t:'Pending',c:'var(--warn)',bg:'rgba(245,196,81,.1)',ln:'rgba(245,196,81,.3)',anim:''};
  if(k.disabled)return{t:'Disabled',c:'var(--danger)',bg:'rgba(255,122,122,.1)',ln:'rgba(255,122,122,.28)',anim:''};
  if(isOnline(k))return{t:'Online',c:'var(--acc)',bg:'rgba(199,242,80,.12)',ln:'rgba(199,242,80,.32)',anim:'animation:ocPulse 1.6s infinite'};
  return{t:'Active',c:'var(--muted)',bg:'rgba(148,152,162,.1)',ln:'rgba(148,152,162,.22)',anim:''};
}
function pctOf(k){return k.limit?Math.min(100,Math.round(k.used/k.limit*100)):0;}
// bar width: real % when limited; a thin sliver for unlimited (never "full")
function barWidth(k){return k.limit?pctOf(k):6;}
function barColor(k){if(k.disabled)return '#3a3d44';if(!k.limit)return 'var(--acc)';const p=pctOf(k);return p>=90?'var(--danger)':p>=70?'var(--warn)':'var(--acc)';}

/* ---------- app shell ---------- */
function renderApp(){
  const W=innerWidth, narrow=W<720;
  root.innerHTML=`
  <header style="position:sticky;top:0;z-index:30;background:rgba(10,11,12,.82);backdrop-filter:blur(16px);border-bottom:1px solid #1b1d22">
    <div style="max-width:1400px;margin:0 auto;padding:${narrow?'12px 16px':'13px 22px'};display:flex;align-items:center;gap:${narrow?'11px':'16px'}">
      <div style="display:flex;align-items:center;gap:9px;flex:none">
        <span style="width:9px;height:9px;border-radius:50%;background:var(--acc);box-shadow:0 0 11px var(--acc)"></span>
        <span style="font-weight:800;font-size:16px;letter-spacing:-.3px;white-space:nowrap">Outline<span style="${narrow?'display:none':'color:var(--faint);font-weight:600'}"> Control</span></span></div>
      <div id="srvwrap" style="position:relative;flex:none"></div>
      <div style="flex:1"></div>
      <div style="position:relative;${narrow?'display:none':'width:230px'}">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#5b606b" stroke-width="2" style="position:absolute;left:12px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
        <input id="search" data-inp="search" value="${esc(S.search)}" placeholder="Search keys…    /" class="inp" style="padding:9px 12px 9px 36px;font-size:13.5px" /></div>
      <button class="btn" data-act="create" style="${narrow?'display:none':'width:auto;padding:9px 15px;display:flex;align-items:center;gap:7px;font-size:13.5px'}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>New key</button>
      <button class="icon-btn" data-act="settings" aria-label="Settings" style="padding:10px;color:var(--muted)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></button>
      <button data-act="signout" style="${narrow?'display:none':'background:none;border:1px solid var(--line2);color:var(--faint);padding:9px 13px;border-radius:11px;cursor:pointer;font-size:13px'}">Sign out</button>
    </div>
  </header>
  <div style="max-width:1400px;margin:0 auto;padding:${narrow?'16px 16px 96px':'22px 22px 80px'}">
    <div id="shell"></div>
  </div>
  ${narrow?`<button class="btn" data-act="create" style="position:fixed;right:20px;bottom:calc(20px + env(safe-area-inset-bottom));z-index:35;width:auto;display:flex;align-items:center;gap:8px;padding:14px 20px;border-radius:99px;box-shadow:0 12px 30px rgba(199,242,80,.28)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>New key</button>`:''}
  `;
  // shell layout
  const wide=W>=1100, mid=W>=720&&W<1100;
  const kpiGrid='display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:11px';
  let shellStyle,kpiOuter,contentStyle,railStyle;
  if(wide){shellStyle='display:grid;grid-template-columns:1fr 336px;gap:18px 24px;align-items:start';kpiOuter='grid-column:1 / -1;'+kpiGrid;contentStyle='min-width:0';railStyle='position:sticky;top:84px;display:flex;flex-direction:column;gap:14px';}
  else if(mid){shellStyle='display:flex;flex-direction:column;gap:18px';kpiOuter=kpiGrid;contentStyle='min-width:0';railStyle='display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start';}
  else {shellStyle='display:flex;flex-direction:column;gap:18px';kpiOuter=kpiGrid;contentStyle='min-width:0';railStyle='display:flex;flex-direction:column;gap:14px';}
  $('#shell').style.cssText=shellStyle;
  $('#shell').innerHTML=`<div id="kpi" style="${kpiOuter}"></div>
    <div style="${contentStyle}">
      ${narrow?'<div style="margin-bottom:14px"><div style="position:relative"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5b606b" stroke-width="2" style="position:absolute;left:13px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg><input id="msearch" data-inp="search" value="'+esc(S.search)+'" placeholder="Search keys…" class="inp" style="padding:12px 12px 12px 38px"/></div></div>':''}
      <div id="toolbar"></div><div id="banner"></div><div id="selbar"></div>
      <div id="count" style="font-size:11.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin:0 2px 10px;font-weight:600"></div>
      <div id="list"></div>
    </div>
    <aside id="rail" style="${railStyle}"></aside>`;
  renderSrv();renderKpi();renderToolbar();renderList();renderRail();
}

function renderSrv(){
  const wrap=$('#srvwrap');if(!wrap)return;
  const sf=S.servers.find(s=>s.id===S.srvFilter);

function renderRail(){
  const rail=$('#rail');if(!rail)return;const st=S.stats;
  if(!st||!st.available){rail.innerHTML=`<div style="background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;font-size:12.5px;color:var(--muted);line-height:1.5"><b style="color:var(--text)">Advanced stats are off.</b> Enable metrics sharing for a server (Settings) to see live bandwidth, online users and ISP locations.</div>`;return;}
  // bandwidth sparkline
  const sm=S.bwSamples.length?S.bwSamples:[0,0];const mn=Math.min(...sm),mx=Math.max(...sm),rng=(mx-mn)||1,SW=280,Hh=58,n=sm.length;
  const pts=sm.map((v,i)=>[(i/Math.max(1,n-1))*SW,Hh-4-((v-mn)/rng)*(Hh-10)]);
  const path='M'+pts.map(p=>p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' L');const area=path+(' L'+SW+' '+Hh+' L0 '+Hh+' Z');
  let html=`<div style="background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px">

    <svg viewBox="0 0 280 60" preserveAspectRatio="none" style="width:100%;height:56px;margin-top:8px;display:block;overflow:visible"><defs><linearGradient id="ocBwG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c7f250" stop-opacity=".28"/><stop offset="1" stop-color="#c7f250" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#ocBwG)"/><path d="${path}" fill="none" stroke="#c7f250" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>
    <div class="mono" style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--faint)"><span>peak ${fmtBytes(st.bwPeak)}/s</span><span>tunnel ${fmtDur(st.tunnelSec)}</span></div></div>`;
  // locations
  const locs=(st.locations||[]).map(l=>({cc:l.location||'',asn:l.asn,org:l.asOrg,bytes:(l.dataTransferred||{}).bytes||0})).filter(l=>l.bytes>0).sort((a,b)=>b.bytes-a.bytes).slice(0,6);
  if(locs.length){const max=locs[0].bytes;html+=`<div style="background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px"><div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:600;margin-bottom:14px">Connections by network · ISP</div>`+
    locs.map(l=>{const primary=l.org||(l.asn?'AS'+l.asn:countryName(l.cc));const sub=countryName(l.cc)+(l.asn?' · AS'+l.asn:'');return `<div style="display:flex;align-items:center;gap:11px;margin-bottom:13px"><span style="font-size:17px;width:22px;text-align:center;flex:none">${flag(l.cc)}</span><div style="flex:1;min-width:0"><div style="font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(primary)}</div><div class="mono" style="font-size:10.5px;color:var(--dim);margin-top:2px">${esc(sub)}</div></div><div style="width:88px;flex:none"><div style="height:5px;background:#1b1d22;border-radius:99px;overflow:hidden"><span style="display:block;height:100%;border-radius:99px;background:var(--acc);width:${Math.max(6,Math.round(l.bytes/max*100))}%"></span></div><div class="mono" style="font-size:11px;color:var(--muted);text-align:right;margin-top:5px">${fmtBytes(l.bytes)}</div></div></div>`;}).join('')+`</div>`;}
  // per-server
  if(S.servers.length>1){html+=`<div style="background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px"><div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:600;margin-bottom:6px">Per-server metrics</div>`+
    S.servers.map(s=>{const ps=(st.perServer||[]).find(p=>p.id===s.id)||{};const ks=S.keys.filter(k=>k.serverId===s.id);return `<div style="padding:12px 0;border-bottom:1px solid #1c1e23"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="width:7px;height:7px;border-radius:50%;flex:none;background:${s.reachable?'var(--acc)':'var(--danger)'};box-shadow:0 0 6px ${s.reachable?'var(--acc)':'var(--danger)'}"></span><span style="font-size:12.5px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.name)}</span><span class="mono" style="font-size:11px;color:var(--dim)">${s.version?'v'+esc(s.version):''}</span></div><div class="mono" style="display:flex;flex-wrap:wrap;gap:13px;font-size:11.5px;color:var(--faint)"><span><b style="color:var(--text);font-weight:600">${ks.length}</b> keys</span><span><b style="color:var(--acc);font-weight:600">${ks.filter(isOnline).length}</b> online</span><span><b style="color:var(--text);font-weight:600">${fmtBytes(ps.dataBytes||0)}</b> 30d</span></div></div>`;}).join('')+`</div>`;}
  rail.innerHTML=html;
}

    <div class="srow" id="rowBot"><span class="sdot" id="botDot" style="width:9px;height:9px;border-radius:50%;flex:none;background:var(--danger)"></span><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">Telegram bot</div><div class="mono" id="botSub" style="font-size:11.5px;color:var(--dim);margin-top:2px">Loading…</div></div><span style="color:var(--dim)">›</span></div>
    <div class="srow" data-act="security"><span style="width:9px;height:9px;border-radius:50%;flex:none;background:var(--acc)"></span><div style="flex:1"><div style="font-size:14px;font-weight:600">Security</div><div style="font-size:11.5px;color:var(--dim);margin-top:2px">Password &amp; two-factor</div></div><span style="color:var(--dim)">›</span></div>
    <div class="srow" data-act="backup"><span style="width:9px;height:9px;border-radius:50%;flex:none;background:var(--acc)"></span><div style="flex:1"><div style="font-size:14px;font-weight:600">Backup &amp; restore</div><div style="font-size:11.5px;color:var(--dim);margin-top:2px">Download or restore all data</div></div><span style="color:var(--dim)">›</span></div>`,{wide:true});
  $('#rowBot').onclick=()=>modalBot();
  api('/api/settings/bot').then(b=>{const d=$('#botDot'),su=$('#botSub');if(d)d.style.background=b.running?'var(--acc)':'var(--danger)';if(su)su.textContent=b.running?('Active · @'+(b.username||'bot')):(b.configured?'Configured · stopped':'Not configured');}).catch(()=>{});
}
function modalAddServer(){
  const ov=openSheet(`<div class="h2">Add a server</div><p class="desc">Paste the API URL, or the full Outline Manager access config (JSON with apiUrl and certSha256).</p>
    <div class="field"><label class="lab">Label</label><input id="an" class="inp" placeholder="e.g. Sweden · Hetzner" /></div>
    <div class="field"><label class="lab">API URL or access config</label><textarea id="au" class="inp" placeholder='https://1.2.3.4:1234/xxxx   —or—   {"apiUrl":"…","certSha256":"…"}'></textarea></div>
    <div id="ae" class="err"></div><button class="btn" id="ago">Connect &amp; add</button><div style="height:10px"></div><button class="btn-sec" data-act="settings">Cancel</button>`);
  ov.querySelector('#an').focus();
  ov.querySelector('#ago').onclick=async()=>{const name=ov.querySelector('#an').value.trim();const apiUrl=ov.querySelector('#au').value.trim();const er=ov.querySelector('#ae');if(!name){er.textContent='Enter a label.';return;}if(!apiUrl){er.textContent='Paste the API URL.';return;}
    const b=ov.querySelector('#ago');b.disabled=true;b.innerHTML='<span class="spin"></span>';
    try{await api('/api/servers',{method:'POST',body:JSON.stringify({name,apiUrl})});toast('Server connected');await loadAll();renderApp();modalSettings();}catch(e){er.textContent=e.message;b.disabled=false;b.textContent='Connect & add';}};
}
async function modalServerDetail(s){
  const ov=openSheet(`<div class="h2">${esc(s.name)}</div><p class="desc">Loading…</p>`);
  let st;try{st=await api('/api/servers/'+s.id+'/settings');}catch(e){ov.querySelector('.desc').textContent=e.message;return;}
  const gl=st.globalLimit?(st.globalLimit/1073741824):'';
  ov.querySelector('.sheet').innerHTML=`${innerWidth<720?'<div class="grip"></div>':''}<div class="h2">${esc(s.name)}</div><p class="mono desc" style="font-size:13px">${esc(st.host||'')}${st.version?' · Outline v'+esc(st.version):''}</p>
    <div class="field"><label class="lab">Label (shown in this panel)</label><input id="dl" class="inp" value="${esc(s.name)}" /></div>
    <div class="field"><label class="lab">Outline server name</label><input id="dn" class="inp" value="${esc(st.name||'')}" /></div>
    <div class="field"><label class="lab">Default data limit · all keys · GB</label><input id="dg" class="inp" type="number" min="0" value="${gl}" placeholder="No global limit" /></div>
    <div class="field"><div style="display:flex;align-items:center;justify-content:space-between;gap:12px"><div><label class="lab" style="margin-bottom:2px">Metrics sharing</label><div style="font-size:12px;color:var(--dim);max-width:220px">Live bandwidth, online users &amp; ISP locations.</div></div><div class="toggle ${st.metricsEnabled?'on':''}" id="dm"><div class="tk"></div><div class="kn"></div></div></div></div>
    <div id="de" class="err"></div><button class="btn" id="dsave">Save</button><div style="height:10px"></div><button class="btn-danger" id="drm">Remove this server</button>`;
  let metrics=!!st.metricsEnabled;const tg=ov.querySelector('#dm');
  tg.onclick=async()=>{metrics=!metrics;tg.classList.toggle('on',metrics);try{await api('/api/servers/'+s.id+'/settings/metrics',{method:'PUT',body:JSON.stringify({enabled:metrics})});toast('Metrics '+(metrics?'enabled':'disabled'));}catch(e){toast(e.message,1);metrics=!metrics;tg.classList.toggle('on',metrics);}};
  ov.querySelector('#dsave').onclick=async()=>{const label=ov.querySelector('#dl').value.trim();const oname=ov.querySelector('#dn').value.trim();const lg=parseFloat(ov.querySelector('#dg').value||'0')||0;const b=ov.querySelector('#dsave');b.disabled=true;b.innerHTML='<span class="spin"></span>';const er=ov.querySelector('#de');
    try{if(label&&label!==s.name)await api('/api/servers/'+s.id,{method:'PUT',body:JSON.stringify({name:label})});if(oname&&oname!==st.name)await api('/api/servers/'+s.id+'/settings/name',{method:'PUT',body:JSON.stringify({name:oname})});await api('/api/servers/'+s.id+'/settings/global-limit',{method:'PUT',body:JSON.stringify({limit_gb:lg})});toast('Saved');await loadAll();renderApp();modalSettings();}catch(e){er.textContent=e.message;b.disabled=false;b.textContent='Save';}};
  ov.querySelector('#drm').onclick=async()=>{if(!confirm('Remove “'+s.name+'” from this panel? (The Outline server itself is not deleted.)'))return;try{await api('/api/servers/'+s.id,{method:'DELETE'});toast('Server removed');await loadAll();renderApp();modalSettings();}catch(e){toast(e.message,1);}};
}
function modalBot(){
  const ov=openSheet(`<div class="h2">Telegram bot</div><p class="desc">Paste your bot token from @BotFather and the numeric admin IDs. The bot runs inside the panel — no separate process.</p>
    <div id="botStatus" class="desc" style="background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:16px">Loading…</div>
    <div class="field"><label class="lab">Bot token</label><input id="bt" class="inp" placeholder="123456:ABC… (blank = keep current)" /></div>
    <div class="field"><label class="lab">Admin Telegram IDs (comma separated)</label><input id="bi" class="inp" placeholder="e.g. 11111111, 22222222" /><div style="font-size:12px;color:var(--dim);margin-top:7px">Send /id to your bot to find an ID.</div></div>
    <div class="field"><label class="lab">Mini App URL (public HTTPS base)</label><input id="bw" class="inp" placeholder="https://panel.example.com" /><div style="font-size:12px;color:var(--dim);margin-top:7px">Opens a Telegram Web App from the bot at <span class="mono">&lt;base&gt;/tma</span>. Must be HTTPS.</div></div>
    <div class="field"><div style="display:flex;align-items:center;justify-content:space-between;gap:12px"><div><label class="lab" style="margin-bottom:2px">Enabled</label><div style="font-size:12px;color:var(--dim)">Turn the bot on or off.</div></div><div class="toggle on" id="be"><div class="tk"></div><div class="kn"></div></div></div></div>
    <div id="boterr" class="err"></div><button class="btn" id="bsave">Save &amp; apply</button><div style="height:10px"></div><button class="btn-sec" id="btest">Test token</button>`);
  let enabled=true;const tg=ov.querySelector('#be');tg.onclick=()=>{enabled=!enabled;tg.classList.toggle('on',enabled);};
  const refresh=()=>api('/api/settings/bot').then(b=>{ov.querySelector('#botStatus').innerHTML=b.running?('<b style="color:var(--acc)">Running</b> as @'+esc(b.username||'bot')):(b.configured?'<b>Configured</b> but stopped.':'<b>Not configured</b> yet.');ov.querySelector('#bi').value=(b.adminIds||[]).join(', ');ov.querySelector('#bw').value=b.webappUrl||'';enabled=b.enabled;tg.classList.toggle('on',enabled);}).catch(()=>{});
  refresh();
  ov.querySelector('#btest').onclick=async()=>{const tok=ov.querySelector('#bt').value.trim();const er=ov.querySelector('#boterr');if(!tok){er.textContent='Enter a token to test.';return;}er.textContent='';try{const r=await api('/api/settings/bot/test',{method:'POST',body:JSON.stringify({token:tok})});toast('Valid · @'+r.username);}catch(e){er.textContent=e.message;}};
  ov.querySelector('#bsave').onclick=async()=>{const tok=ov.querySelector('#bt').value.trim();const ids=ov.querySelector('#bi').value.trim();const wu=ov.querySelector('#bw').value.trim();const er=ov.querySelector('#boterr');er.textContent='';const b=ov.querySelector('#bsave');b.disabled=true;b.innerHTML='<span class="spin"></span>';
    try{await api('/api/settings/bot',{method:'PUT',body:JSON.stringify({token:tok||null,adminIds:ids,enabled,webappUrl:wu})});toast('Saved');closeModal();}catch(e){er.textContent=e.message;b.disabled=false;b.textContent='Save & apply';}};
}
function modalSecurity(){
  const ov=openSheet(`<div class="h2">Security</div><p class="desc">Change the panel password and set up two-factor authentication.</p>
    <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:600;margin-bottom:12px">Change password</div>
    <div class="field"><label class="lab">Current password</label><input id="pc" class="inp" type="password" autocomplete="current-password" /></div>
    <div class="field"><label class="lab">New password</label><input id="pn" class="inp" type="password" autocomplete="new-password" /></div>
    <div id="pwerr" class="err"></div><button class="btn" id="pwsave">Update password</button>
    <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:600;margin:26px 0 12px">Two-factor authentication</div>
    <div id="tfa"><div class="desc">Loading…</div></div>`);
  ov.querySelector('#pwsave').onclick=async()=>{const cur=ov.querySelector('#pc').value;const nw=ov.querySelector('#pn').value;const er=ov.querySelector('#pwerr');er.textContent='';if(nw.length<6){er.textContent='New password must be at least 6 characters.';return;}const b=ov.querySelector('#pwsave');b.disabled=true;b.innerHTML='<span class="spin"></span>';
    try{await api('/api/settings/password',{method:'POST',body:JSON.stringify({current:cur,new:nw})});toast('Password updated');ov.querySelector('#pc').value='';ov.querySelector('#pn').value='';}catch(e){er.textContent=e.message;}finally{b.disabled=false;b.textContent='Update password';}};
  const tfa=ov.querySelector('#tfa');
  const render=()=>api('/api/settings').then(s=>{
    if(s.totpEnabled){tfa.innerHTML='<div class="desc" style="margin-bottom:10px">2FA is <b style="color:var(--acc)">enabled</b>.</div><div class="field"><label class="lab">Password to disable</label><input id="tpw" class="inp" type="password" /></div><button class="btn-danger" id="tdis">Disable 2FA</button>';
      tfa.querySelector('#tdis').onclick=async()=>{try{await api('/api/settings/2fa/disable',{method:'POST',body:JSON.stringify({password:tfa.querySelector('#tpw').value})});toast('2FA disabled');render();}catch(e){toast(e.message,1);}};}
    else{tfa.innerHTML='<button class="btn-sec" id="tstart">Set up 2FA</button>';
      tfa.querySelector('#tstart').onclick=async()=>{try{const r=await api('/api/settings/2fa/start',{method:'POST'});
        tfa.innerHTML='<p class="desc">Scan with Google Authenticator / Authy, then enter the 6-digit code.</p><div style="display:grid;place-items:center;margin:4px 0 14px"><div id="tq" style="padding:14px;background:#fff;border-radius:16px;line-height:0"></div></div><div class="mono" style="background:var(--panel2);border:1px solid var(--line2);border-radius:12px;padding:12px;font-size:12px;word-break:break-all;color:var(--acc);margin-bottom:14px">'+esc(r.secret)+'</div><div class="field"><label class="lab">6-digit code</label><input id="tcode" class="inp" inputmode="numeric" placeholder="000000" /></div><div id="tferr" class="err"></div><button class="btn" id="tconf">Enable 2FA</button>';
        renderQR(tfa.querySelector('#tq'),r.uri);
        tfa.querySelector('#tconf').onclick=async()=>{try{await api('/api/settings/2fa/enable',{method:'POST',body:JSON.stringify({code:tfa.querySelector('#tcode').value})});toast('2FA enabled');render();}catch(e){tfa.querySelector('#tferr').textContent=e.message;}};
      }catch(e){toast(e.message,1);}};}
  }).catch(()=>{tfa.innerHTML='<div class="desc">Could not load 2FA status.</div>';});
  render();
}
function modalBackup(){
  const ov=openSheet(`<div class="h2">Backup &amp; restore</div><p class="desc">Download a JSON snapshot of every server, key and setting. Keep it somewhere safe.</p>
    <button class="btn" id="bkdl">⤓ Download backup</button>
    <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:600;margin:26px 0 12px">Restore</div>
    <p class="desc">Restoring <b>replaces</b> all current data.</p>
    <input id="bkfile" class="inp" type="file" accept="application/json,.json" style="padding:11px" />
    <div id="bkerr" class="err"></div><div style="height:12px"></div><button class="btn-danger" id="bkres">Restore from file</button>`);
  ov.querySelector('#bkdl').onclick=async()=>{try{const r=await fetch('/api/backup',{credentials:'same-origin'});if(!r.ok)throw new Error('Download failed');const blob=await r.blob();const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='outline-panel-backup.json';a.click();URL.revokeObjectURL(a.href);toast('Backup downloaded');}catch(e){toast(e.message,1);}};
  ov.querySelector('#bkres').onclick=async()=>{const f=ov.querySelector('#bkfile').files[0];const er=ov.querySelector('#bkerr');er.textContent='';if(!f){er.textContent='Choose a backup file first.';return;}if(!confirm('Restore will REPLACE all current data. Continue?'))return;const b=ov.querySelector('#bkres');b.disabled=true;b.innerHTML='<span class="spin"></span>';
    try{const data=JSON.parse(await f.text());const r=await api('/api/restore',{method:'POST',body:JSON.stringify(data)});toast('Restored '+r.servers+' servers, '+r.keys+' keys');closeModal();await loadAll();renderApp();}catch(e){er.textContent=e.message||'Invalid backup file';b.disabled=false;b.textContent='Restore from file';}};
}

/* ---------- actions ---------- */
async function copyKey(id){const k=keyById(id);if(!k)return;try{await navigator.clipboard.writeText(tagUrl(k));toast('Copied to clipboard');}catch(_){prompt('Copy:',tagUrl(k));}}
async function bulk(op){const ids=Object.keys(S.selected).filter(id=>S.selected[id]&&keyById(id));if(op==='clear'){S.selected={};renderList();return;}if(!ids.length)return;
  if(op==='delete'&&!confirm('Delete '+ids.length+' key(s)? This cannot be undone.'))return;
  for(const id of ids){const k=keyById(id);if(!k)continue;const kb='/api/servers/'+k.serverId+'/keys/'+k.id;try{
    if(op==='extend')await api(kb+'/extend',{method:'POST',body:JSON.stringify({days:30})});
    else if(op==='disable')await api(kb+'/disable',{method:'POST'});
    else if(op==='delete')await api(kb,{method:'DELETE'});}catch(e){toast(e.message,1);}}
  S.selected={};toast('Done');await refreshKeys();renderList();}

/* ---------- event delegation ---------- */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-act]');if(!t)return;const a=t.dataset.act,d=t.dataset;
  if(d.stop)e.stopPropagation();
  switch(a){
    case 'close':closeModal();break;
    case 'create':closeModal();modalCreate();break;
    case 'settings':closeModal();modalSettings();break;
    case 'signout':signOut();break;
    case 'srvmenu':S.srvMenuOpen=!S.srvMenuOpen;renderSrv();break;
    case 'srvpick':S.srvFilter=d.id;S.srvMenuOpen=false;renderSrv();renderList();renderRail();break;
    case 'statusf':S.statusFilter=d.id;renderList();break;
    case 'view':S.view=d.id;localStorage.setItem('oc_view',d.id);renderList();break;
    case 'dismissbanner':S.bannerDismissed=true;renderBanner();break;
    case 'selall':{const list=filteredKeys();const all=list.length&&list.every(k=>S.selected[k.id]);list.forEach(k=>{if(all)delete S.selected[k.id];else S.selected[k.id]=true;});renderList();break;}
    case 'sel':{if(S.selected[d.id])delete S.selected[d.id];else S.selected[d.id]=true;renderList();break;}
    case 'bulk':bulk(d.op);break;
    case 'copy':copyKey(d.id);break;
    case 'copytext':navigator.clipboard.writeText(d.text).then(()=>toast('Copied')).catch(()=>prompt('Copy:',d.text));break;
    case 'share':{const k=keyById(d.id);if(k)modalShare(k);break;}
    case 'detail':{const k=keyById(d.id);if(k)modalDetail(k);break;}
    case 'manage':{const k=keyById(d.id);if(k){closeModal();modalManage(k);}break;}
    case 'config':{const k=keyById(d.id);if(k)modalConfig(k);break;}
    case 'toggle':{const k=keyById(d.id);if(k){const kb='/api/servers/'+k.serverId+'/keys/'+k.id;api(kb+'/'+(k.disabled?'enable':'disable'),{method:'POST'}).then(async()=>{toast(k.disabled?'Key enabled':'Key disabled');closeModal();await refreshKeys();renderList();}).catch(e=>toast(e.message,1));}break;}
    case 'resetkey':{const k=keyById(d.id);if(k&&confirm('Reset usage for “'+k.name+'”?')){api('/api/servers/'+k.serverId+'/keys/'+k.id+'/reset',{method:'POST'}).then(async()=>{toast('Usage reset');closeModal();await refreshKeys();renderList();}).catch(e=>toast(e.message,1));}break;}
    case 'delkey':{const k=keyById(d.id);if(k&&confirm('Delete “'+k.name+'”?')){api('/api/servers/'+k.serverId+'/keys/'+k.id,{method:'DELETE'}).then(async()=>{toast('Key deleted');closeModal();await refreshKeys();renderList();}).catch(e=>toast(e.message,1));}break;}
    case 'addserver':modalAddServer();break;
    case 'srvdetail':{const s=S.servers.find(x=>x.id===d.id);if(s)modalServerDetail(s);break;}
    case 'security':modalSecurity();break;
    case 'backup':modalBackup();break;
  }
});
// backdrop click (overlay only)
modalRoot.addEventListener('click',e=>{if(e.target.classList.contains('overlay'))closeModal();});
document.addEventListener('input',e=>{const t=e.target;if(t.dataset.inp==='search'){S.search=t.value;const other=t.id==='search'?$('#msearch'):$('#search');if(other&&other.value!==t.value)other.value=t.value;renderList();}});
document.addEventListener('change',e=>{const t=e.target;if(t.dataset.inp==='sort'){S.sort=t.value;localStorage.setItem('oc_sort',t.value);renderList();}});
// chips in create modal set inputs
document.addEventListener('click',e=>{const c=e.target.closest('[data-chip]');if(!c)return;const inp=document.getElementById(c.dataset.chip);if(inp)inp.value=c.dataset.v;const grp=c.parentElement;grp.querySelectorAll('[data-chip]').forEach(x=>x.classList.remove('sel'));c.classList.add('sel');});
document.addEventListener('keydown',e=>{
  const typing=/INPUT|TEXTAREA|SELECT/.test((e.target&&e.target.tagName)||'');
  if(e.key==='Escape'){if(modalRoot.innerHTML){closeModal();return;}if(S.srvMenuOpen){S.srvMenuOpen=false;renderSrv();return;}if(Object.keys(S.selected).length){S.selected={};renderList();}return;}
  if(typing||modalRoot.innerHTML||S.screen!=='app')return;
  if(e.key==='/'){e.preventDefault();($('#search')||$('#msearch'))?.focus();}
  else if(e.key==='n'||e.key==='N'){e.preventDefault();modalCreate();}
});
let rsT;addEventListener('resize',()=>{clearTimeout(rsT);rsT=setTimeout(()=>{if(S.screen==='app')renderApp();},200);});

checkAuth();
</script>
