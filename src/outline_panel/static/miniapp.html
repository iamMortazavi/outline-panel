<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>پنل Outline</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#17212b; --panel:#232e3c; --panel2:#1c2733; --text:#fff; --dim:#7d8b99;
    --line:#2b3947; --acc:#2ea6ff; --acc2:#3390ec; --btxt:#fff;
    --ok:#4dd36f; --warn:#f0b429; --danger:#ff5c5c; --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Vazirmatn",Tahoma,sans-serif;
    background:var(--bg); color:var(--text); font-size:15px; line-height:1.5;
    padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 90px);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:14px}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;direction:ltr;unicode-bidi:plaintext}
  .muted{color:var(--dim)}
  .row{display:flex;align-items:center;gap:10px}
  .spread{justify-content:space-between}

  /* header summary */
  .hero{
    background:linear-gradient(135deg,var(--acc2),var(--acc));
    border-radius:var(--radius); padding:18px; color:#fff; margin-bottom:14px;
    box-shadow:0 8px 24px -12px rgba(0,0,0,.5);
  }
  .hero .big{font-size:30px;font-weight:800;letter-spacing:-.5px;margin-top:2px}
  .hero .sub{opacity:.92;font-size:13px}
  .hero .stats{display:flex;gap:18px;margin-top:12px;font-size:13px;opacity:.95}
  .hero .stats b{font-size:16px;font-weight:700}

  /* chips */
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{
    white-space:nowrap;padding:7px 14px;border-radius:999px;background:var(--panel);
    border:1px solid var(--line);color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;
  }
  .chip.on{background:var(--acc);border-color:var(--acc);color:#fff}

  /* key card */
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:10px;
  }
  .kname{font-weight:700;font-size:15.5px;display:flex;align-items:center;gap:7px;min-width:0}
  .kname span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .tag{font-size:11px;color:var(--dim);background:var(--panel2);border:1px solid var(--line);
    border-radius:6px;padding:2px 7px;white-space:nowrap}
  .bar{height:7px;border-radius:6px;background:var(--panel2);overflow:hidden;margin:11px 0 7px}
  .bar > i{display:block;height:100%;border-radius:6px;transition:width .4s}
  .usage{font-size:12.5px;color:var(--dim);display:flex;justify-content:space-between}
  .kmeta{font-size:12px;color:var(--dim);margin-top:7px}
  .klink{margin-top:11px;display:flex;gap:8px}
  .lbtn{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:11px;padding:9px;font-size:13px;font-weight:600;cursor:pointer}
  .lbtn:active{opacity:.7}

  /* buttons */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;
    background:var(--acc);color:var(--btxt);border-radius:13px;padding:14px;font-size:15px;
    font-weight:700;cursor:pointer;font-family:inherit}
  .btn:active{opacity:.85}
  .btn[disabled]{opacity:.55;cursor:default}
  .btn-sec{background:var(--panel);border:1px solid var(--line);color:var(--text)}

  /* fab */
  .fab{position:fixed;left:0;right:0;bottom:0;padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,var(--bg) 60%,transparent);z-index:30;max-width:560px;margin:0 auto}

  /* sheet */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40;opacity:0;pointer-events:none;
    transition:opacity .25s}
  .scrim.on{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--bg);
    border-radius:20px 20px 0 0;padding:8px 16px calc(20px + env(safe-area-inset-bottom));
    max-width:560px;margin:0 auto;transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
    max-height:92vh;overflow-y:auto}
  .sheet.on{transform:translateY(0)}
  .grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:6px auto 14px}
  .h2{font-size:18px;font-weight:800;margin:0 0 4px}
  .desc{font-size:13px;color:var(--dim);margin:0 0 16px}
  .field{margin-bottom:14px}
  .lab{display:block;font-size:13px;font-weight:600;margin-bottom:7px}
  .inp{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:13px;color:var(--text);font-size:15px;font-family:inherit;outline:none}
  .inp:focus{border-color:var(--acc)}
  .two{display:flex;gap:10px}.two>.field{flex:1}
  .hint{font-size:11.5px;color:var(--dim);margin-top:6px}
  .err{color:var(--danger);font-size:13px;min-height:18px;margin:4px 0}

  /* state screens */
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;min-height:60vh;padding:24px;gap:10px}
  .emoji{font-size:44px}
  .spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;
    border-radius:50%;display:inline-block;animation:sp .7s linear infinite;vertical-align:-3px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .skel{height:96px;border-radius:var(--radius);background:linear-gradient(90deg,var(--panel),var(--panel2),var(--panel));
    background-size:200% 100%;animation:sh 1.2s infinite;margin-bottom:10px}
  @keyframes sh{to{background-position:-200% 0}}

  /* toast */
  #toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
    background:#000c;color:#fff;padding:10px 18px;border-radius:12px;font-size:13.5px;font-weight:600;
    z-index:60;opacity:0;transition:.25s;max-width:90%;text-align:center;pointer-events:none}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.bad{background:#c0392b}
</style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="center"><span class="spin"></span></div>
  </div>

  <div class="fab" id="fab" style="display:none">
    <button class="btn" id="fabBtn">➕ ساخت یوزر جدید</button>
  </div>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet"></div>
  <div id="toast"></div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
const initData = (tg && tg.initData) || "";
let SERVERS = [];
let FILTER = null;          // server id filter or null = all
let DATA = {keys:[], errors:[]};

/* ---- Telegram theme ---- */
function applyTheme(){
  if(!tg) return;
  const p = tg.themeParams || {};
  const set=(k,v)=>{ if(v) document.documentElement.style.setProperty(k,v); };
  set('--bg',p.bg_color); set('--text',p.text_color); set('--dim',p.hint_color);
  set('--panel',p.secondary_bg_color); set('--acc',p.button_color);
  set('--acc2',p.button_color); set('--btxt',p.button_text_color);
  if(p.section_bg_color) set('--panel2',p.section_bg_color);
  try{ tg.setHeaderColor && tg.setHeaderColor(p.bg_color || '#17212b'); }catch(e){}
}
if(tg){ tg.ready(); tg.expand(); applyTheme(); tg.onEvent('themeChanged',applyTheme); }

/* ---- helpers ---- */
function haptic(t){ try{ tg && tg.HapticFeedback && tg.HapticFeedback.impactOccurred(t||'light'); }catch(e){} }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtBytes(n){
  if(n==null) return '∞';
  n=Number(n); const u=['B','KB','MB','GB','TB']; let i=0;
  while(Math.abs(n)>=1024 && i<u.length-1){ n/=1024; i++; }
  return (n>=100||i===0 ? n.toFixed(0) : n.toFixed(1))+' '+u[i];
}
function fmtExpiry(k){
  if(k.disabled) return '⛔️ غیرفعال';
  if(k.pending) return '⏳ '+k.durationDays+' روز از اولین اتصال';
  if(!k.expiry) return '♾ بدون انقضا';
  const left = k.expiry - Date.now()/1000;
  if(left<=0) return '⌛️ منقضی شده';
  const d=Math.floor(left/86400), h=Math.floor((left%86400)/3600);
  return '⏳ '+(d>0? d+' روز': h+' ساعت')+' مانده';
}
let toastT;
function toast(msg,bad){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='on'+(bad?' bad':''); clearTimeout(toastT);
  toastT=setTimeout(()=>t.className=bad?'bad':'',1900);
}
async function api(path,opts){
  opts=opts||{};
  const r=await fetch(path,{...opts,headers:{
    'Authorization':'tma '+initData,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){ let d; try{d=await r.json()}catch(e){} const e=new Error((d&&d.detail)||('HTTP '+r.status)); e.status=r.status; throw e; }
  return r.json();
}
async function copy(text,label){
  try{ await navigator.clipboard.writeText(text); }
  catch(e){ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta);
    ta.select(); try{document.execCommand('copy')}catch(_){} ta.remove(); }
  haptic('light'); toast((label||'لینک')+' کپی شد ✅');
}

/* ---- render ---- */
function pct(k){ if(k.limit==null||k.limit===0) return 0; return Math.min(100, Math.round(k.used/k.limit*100)); }
function barColor(k){ const p=pct(k); return p>=100?'var(--danger)':p>=80?'var(--warn)':'var(--ok)'; }

function render(){
  const app=document.getElementById('app');
  const list = FILTER ? DATA.keys.filter(k=>k.serverId===FILTER) : DATA.keys;
  const totalUsed = list.reduce((s,k)=>s+(k.used||0),0);
  const active = list.filter(k=>!k.disabled).length;

  let chips='';
  if(SERVERS.length>1){
    chips='<div class="chips"><div class="chip'+(FILTER==null?' on':'')+'" data-srv="">همه</div>'+
      SERVERS.map(s=>'<div class="chip'+(FILTER===s.id?' on':'')+'" data-srv="'+esc(s.id)+'">'+esc(s.name)+'</div>').join('')+'</div>';
  }

  const hero='<div class="hero"><div class="sub">مجموع مصرف</div>'+
    '<div class="big">'+fmtBytes(totalUsed)+'</div>'+
    '<div class="stats"><div><b>'+list.length+'</b> یوزر</div>'+
    '<div><b>'+active+'</b> فعال</div>'+
    '<div><b>'+SERVERS.length+'</b> سرور</div></div></div>';

  let errs='';
  if(DATA.errors && DATA.errors.length){
    errs=DATA.errors.map(e=>'<div class="card" style="border-color:var(--danger)">⚠️ <b>'+esc(e.serverName)+'</b> در دسترس نیست<div class="kmeta">'+esc(e.error||'')+'</div></div>').join('');
  }

  let body;
  if(list.length===0){
    body='<div class="center"><div class="emoji">🗂</div><div style="font-weight:700">هنوز یوزری نیست</div>'+
      '<div class="muted">با دکمه‌ی پایین اولین یوزر را بساز.</div></div>';
  }else{
    body=list.map(k=>{
      const unlimited = (k.limit==null||k.limit===0);
      const width = unlimited?6:Math.max(pct(k),3);
      const fill = unlimited?'var(--acc)':barColor(k);
      const stat = k.disabled?'var(--danger)':(k.pending?'var(--warn)':'var(--ok)');
      const tag = SERVERS.length>1?'<span class="tag">'+esc(k.serverName)+'</span>':'';
      return '<div class="card">'+
        '<div class="row spread"><div class="kname"><span class="dot" style="background:'+stat+'"></span><span>'+esc(k.name)+'</span></div>'+tag+'</div>'+
        '<div class="bar"><i style="width:'+width+'%;background:'+fill+'"></i></div>'+
        '<div class="usage"><span>'+fmtBytes(k.used)+' از '+(unlimited?'∞':fmtBytes(k.limit))+'</span><span>'+(unlimited?'نامحدود':pct(k)+'%')+'</span></div>'+
        '<div class="kmeta">'+fmtExpiry(k)+'</div>'+
        (k.accessUrl?'<div class="klink"><button class="lbtn" data-copy="'+esc(k.accessUrl)+'">🔗 کپی لینک اتصال</button></div>':'')+
      '</div>';
    }).join('');
  }

  app.innerHTML=hero+chips+errs+body;
  document.getElementById('fab').style.display='block';

  app.querySelectorAll('[data-srv]').forEach(c=>c.onclick=()=>{ FILTER=c.dataset.srv||null; haptic(); render(); });
  app.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>copy(b.dataset.copy,'لینک'));
}

function showError(msg,emoji){
  document.getElementById('app').innerHTML=
    '<div class="center"><div class="emoji">'+(emoji||'🔒')+'</div><div style="font-weight:700">'+esc(msg)+'</div>'+
    '<div class="muted">اگر فکر می‌کنی اشتباه است، از داخل بات تلگرام دوباره باز کن.</div></div>';
  document.getElementById('fab').style.display='none';
}

/* ---- create sheet ---- */
function closeSheet(){ document.getElementById('sheet').className='sheet'; document.getElementById('scrim').className='scrim'; }
function openSheet(html){
  const s=document.getElementById('sheet'); s.innerHTML='<div class="grab"></div>'+html;
  document.getElementById('scrim').className='scrim on';
  requestAnimationFrame(()=>s.className='sheet on');
  return s;
}
document.getElementById('scrim').onclick=closeSheet;

function openCreate(){
  haptic();
  const srvField = SERVERS.length>1
    ? '<div class="field"><label class="lab">سرور</label><select id="cs" class="inp">'+
        SERVERS.map(s=>'<option value="'+esc(s.id)+'">'+esc(s.name)+'</option>').join('')+'</select></div>'
    : '';
  const s=openSheet(
    '<div class="h2">ساخت یوزر جدید</div><p class="desc">یک یوزر تازه روی سرور می‌سازد و لینک اتصالش را می‌دهد.</p>'+
    srvField+
    '<div class="field"><label class="lab">نام یوزر</label><input id="cn" class="inp" placeholder="مثلاً علی" /></div>'+
    '<div class="two">'+
      '<div class="field"><label class="lab">حجم (گیگابایت)</label><input id="cl" class="inp" type="number" inputmode="decimal" min="0" placeholder="0 = نامحدود" /></div>'+
      '<div class="field"><label class="lab">مدت (روز)</label><input id="cd" class="inp" type="number" inputmode="numeric" min="0" placeholder="0 = همیشگی" /></div>'+
    '</div>'+
    '<div class="hint">۰ برای حجم یعنی نامحدود؛ ۰ برای مدت یعنی بدون انقضا (شمارش از اولین اتصال).</div>'+
    '<div id="cerr" class="err"></div>'+
    '<button class="btn" id="cgo">ساخت یوزر</button>');
  setTimeout(()=>s.querySelector('#cn').focus(),300);
  s.querySelector('#cgo').onclick=submitCreate;
}

async function submitCreate(){
  const s=document.getElementById('sheet');
  const server = SERVERS.length>1 ? s.querySelector('#cs').value : SERVERS[0].id;
  const name = s.querySelector('#cn').value.trim();
  const limit_gb = parseFloat(s.querySelector('#cl').value||'0')||0;
  const days = parseInt(s.querySelector('#cd').value||'0',10)||0;
  const err=s.querySelector('#cerr'); err.textContent='';
  if(!name){ err.textContent='نام یوزر را وارد کن.'; return; }
  if(!server){ err.textContent='هیچ سروری تنظیم نشده است.'; return; }
  const btn=s.querySelector('#cgo'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  try{
    const k=await api('/tma/api/keys',{method:'POST',body:JSON.stringify({server,name,limit_gb,days})});
    haptic('medium');
    showCreated(k);
    await load(false);
  }catch(e){ err.textContent=e.message; btn.disabled=false; btn.textContent='ساخت یوزر'; }
}

function showCreated(k){
  openSheet(
    '<div class="center" style="min-height:auto;padding:8px 0 4px"><div class="emoji">✅</div>'+
    '<div style="font-weight:800;font-size:17px">یوزر «'+esc(k.name)+'» ساخته شد</div></div>'+
    '<div class="field"><label class="lab">لینک اتصال</label>'+
      '<div class="inp mono" style="word-break:break-all;font-size:12.5px">'+esc(k.accessUrl)+'</div></div>'+
    '<button class="btn" id="ccopy">📋 کپی لینک</button><div style="height:10px"></div>'+
    '<button class="btn btn-sec" id="cdone">بستن</button>');
  document.getElementById('ccopy').onclick=()=>copy(k.accessUrl,'لینک');
  document.getElementById('cdone').onclick=()=>{ closeSheet(); render(); };
}

document.getElementById('fabBtn').onclick=openCreate;

/* ---- load ---- */
async function load(showSkeleton){
  if(showSkeleton){
    document.getElementById('app').innerHTML='<div class="skel"></div><div class="skel"></div><div class="skel"></div>';
  }
  try{
    const d=await api('/tma/api/keys'+(FILTER?('?server='+encodeURIComponent(FILTER)):''));
    DATA=d; render();
  }catch(e){
    if(e.status===401) showError('دسترسی نامعتبر','🔒');
    else if(e.status===403) showError('شما ادمین نیستید','⛔️');
    else if(e.status===503) showError('بات هنوز تنظیم نشده','🛠');
    else showError(e.message,'⚠️');
  }
}

async function boot(){
  if(!initData){ showError('این صفحه فقط داخل تلگرام باز می‌شود','📱'); return; }
  try{
    const b=await api('/tma/api/bootstrap');
    SERVERS=b.servers||[];
    await load(true);
  }catch(e){
    if(e.status===403) showError('شما ادمین نیستید','⛔️');
    else if(e.status===401) showError('دسترسی نامعتبر','🔒');
    else if(e.status===503) showError('بات هنوز تنظیم نشده','🛠');
    else showError(e.message,'⚠️');
  }
}
boot();
</script>
</body>
</html>
